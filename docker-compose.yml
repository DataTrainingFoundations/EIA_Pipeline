services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./warehouse/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "29000:9000"
      - "29001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/bronze;
      mc mb -p local/silver;
      mc ls local;
      exit 0;
      "

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  spark-master:
    # NEW: changed Spark image from 4.1.0 to 3.5.1 so runtime matches your Kafka package 3.5.1
    image: apache/spark:3.5.1
    environment:
      SPARK_NO_DAEMONIZE: "true"
      # NEW: pass MinIO username into Spark container so S3A auth matches MinIO
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      # NEW: pass MinIO password into Spark container so Spark can write to Bronze bucket
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]
    ports:
      - "27077:7077"
      - "28088:8080"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  spark-worker-1:
    # NEW: changed Spark image from 4.1.0 to 3.5.1 to keep worker version same as master
    image: apache/spark:3.5.1
    environment:
      SPARK_NO_DAEMONIZE: "true"
      # NEW: keep MinIO credentials available on worker too for consistent Spark environment
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      # NEW: keep MinIO credentials available on worker too for consistent Spark environment
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--webui-port", "8081", "spark://spark-master:7077"]
    ports:
      - "28089:8081"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[o]rg.apache.spark.deploy.worker.Worker'"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      - spark-master

  spark-worker-2:
    # NEW: changed Spark image from 4.1.0 to 3.5.1 to keep worker version same as master
    image: apache/spark:3.5.1
    environment:
      SPARK_NO_DAEMONIZE: "true"
      # NEW: keep MinIO credentials available on worker too for consistent Spark environment
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      # NEW: keep MinIO credentials available on worker too for consistent Spark environment
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--webui-port", "8082", "spark://spark-master:7077"]
    ports:
      - "28090:8082"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[o]rg.apache.spark.deploy.worker.Worker'"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      - spark-master

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    command: ["standalone"]
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      _AIRFLOW_WWW_USER_CREATE: ${AIRFLOW_WWW_USER_CREATE}
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD}
      EIA_API_KEY: ${EIA_API_KEY}
      KAFKA_BROKER: ${KAFKA_BROKER}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "28080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    environment:
      EIA_API_KEY: ${EIA_API_KEY}
      KAFKA_BROKER: ${KAFKA_BROKER}
    volumes:
      - ./ingestion/src:/app/src
    depends_on:
      kafka:
        condition: service_healthy
    profiles:
      - tools

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "28501:8501"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  kafka_data:


