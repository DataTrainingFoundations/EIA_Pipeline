datasets:
  - id: electricity_region_data
    route: electricity/rto/region-data
    topic: eia_electricity_region_data
    frequency: hourly
    hourly_window_mode: current_day_end
    incremental_schedule: "@hourly"
    data_columns:
      - value
    default_facets:
      type:
        - D
        - DF
    bronze_output_path: s3a://bronze/electricity_region_data
    bronze_checkpoint_path: s3a://bronze/checkpoints/electricity_region_data
    silver_output_path: s3a://silver/region_data
    gold_output_path: s3a://gold/facts/region_demand_forecast_hourly
    platinum_table: platinum.region_demand_daily
    backfill:
      start: "2020-01-01T00:00:00+00:00"
      step: day
      max_pending_chunks: 14
  - id: electricity_fuel_type_data
    route: electricity/rto/fuel-type-data
    topic: eia_electricity_fuel_type_data
    frequency: hourly
    incremental_schedule: "20 18 * * *"
    data_columns:
      - value
    bronze_output_path: s3a://bronze/electricity_fuel_type_data
    bronze_checkpoint_path: s3a://bronze/checkpoints/electricity_fuel_type_data
    silver_output_path: s3a://silver/fuel_type_data
    gold_output_path: s3a://gold/facts/fuel_generation_hourly
    backfill:
      start: "2020-01-01T00:00:00+00:00"
      step: day
      max_pending_chunks: 14
  - id: electricity_power_operational_data
    route: electricity/electric-power-operational-data
    topic: eia_electricity_power_operational_data
    frequency: monthly
    incremental_schedule: "0 0 1 * *"

    data_columns:
      - ash-content
      - consumption-for-eg
      - cost
      - generation
      - heat-content

    default_facets:
      location:
        - US

    bronze_output_path: s3a://bronze/electricity_power_operational_data
    bronze_checkpoint_path: s3a://bronze/checkpoints/electricity_power_operational_data
    silver_output_path: s3a://silver/electric_power_operational_data
    gold_output_path: s3a://gold/facts/electric_power_operations_monthly
    platinum_table: platinum.electric_power_operations_monthly

    backfill:
      start: "2010-01-01T00:00:00+00:00"
      step: month
      max_pending_chunks: 10
